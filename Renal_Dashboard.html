<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Renal Course Dashboard</title>

<style>
    body {
        font-family: Arial, sans-serif;
        background: #0f0f0f;
        color: #eaeaea;
        margin: 0;
        padding: 40px;
        text-align: center;
    }

    h1 {
        font-size: 32px;
        margin-bottom: 30px;
        color: #ffffff;
    }

    .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        gap: 25px;
        max-width: 1000px;
        margin: auto;
    }

    .card {
        background: #1a1a1a;
        border-radius: 14px;
        padding: 25px 15px;
        transition: 0.25s;
        cursor: pointer;
        border: 1px solid #2a2a2a;
    }

    .card:hover {
        transform: translateY(-6px);
        background: #242424;
        border-color: #4a4a4a;
    }

    .icon {
        font-size: 42px;
        margin-bottom: 12px;
    }

    a {
        text-decoration: none;
        color: inherit;
    }

    .label {
        font-size: 16px;
        margin-top: 8px;
        font-weight: 600;
        color: #eaeaea;
    }
</style>
</head>

<body>

<h1>Renal Course Dashboard</h1>

<div class="grid">

    <!-- ADH Agonists & Antagonists -->
    <a href="https://doctimmer.github.io/Medical-School-Learning/Renal_Pharmacology_ADH.html" target="_blank">
        <div class="card">
            <div class="icon">💧</div>
            <div class="label">[ADH Agonists & Antagonists]</div>
        </div>
    </a>

    <!-- Acidosis-Alkalosis Game -->
    <a href="https://acid-base-imbalance-learning-game.netlify.app target="_blank">
        <div class="card">
            <div class="icon">🧠</div>
            <div class="label">Acidosis-Alkalosis Game</div>
        </div>
    </a>

    <!-- Quiz/Game 2 -->
    <a href="[INSERT URL HERE]" target="_blank">
        <div class="card">
            <div class="icon">⚗️</div>
            <div class="label">[Electrolytes Quiz]</div>
        </div>
    </a>

    <!-- Resource 1 -->
    <a href="[INSERT URL HERE]" target="_blank">
        <div class="card">
            <div class="icon">📘</div>
            <div class="label">[Renal Physiology Notes]</div>
        </div>
    </a>

    <!-- Resource 2 -->
    <a href="[INSERT URL HERE]" target="_blank">
        <div class="card">
            <div class="icon">🩺</div>
            <div class="label">[Pathology / RTA Tool]</div>
        </div>
    </a>

    <!-- Add More -->
    <a href="[INSERT URL HERE]" target="_blank">
        <div class="card">
            <div class="icon">➕</div>
            <div class="label">[Add Another Resource]</div>
        </div>
    </a>

</div>

</body>
</html>
