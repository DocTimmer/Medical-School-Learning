xt:"Affects ~2% of the general population",answer:"hyper",hint:"This is the baseline prevalence in people without CKD."},{id:"def-5",text:"Occurs in 20–50% of patients on thiazides or furosemide",answer:"hypo",hint:"Which direction do loop and thiazide diuretics shift potassium?"},{id:"def-6",text:"Prevalence jumps to ~10% in patients with CKD or heart failure",answer:"hyper",hint:"Failing kidneys struggle to excrete one particular electrolyte."},{id:"def-7",text:"Up to 20% of hospitalized patients are affected; 5% are clinically significant",answer:"hypo",hint:"Hospital patients often receive fluids, diuretics, or have poor oral intake."},{id:"def-8",text:"Levels > 6.5 mEq/L can cause fatal arrhythmias",answer:"hyper",hint:"At what number does this condition become immediately life-threatening?"},{id:"def-9",text:"Mild range: 5.0–5.5 mEq/L (rarely symptomatic)",answer:"hyper",hint:"Consider which condition starts at 5.0 mEq/L."},{id:"def-10",text:"Symptoms typically absent until levels fall below 3.0 mEq/L",answer:"hypo",hint:"Symptoms emerge as values drop further from the normal floor of 3.5."}]},{id:"patho",title:"Pathophysiology",subtitle:"Assign each mechanism or consequence to the correct condition",icon:"🔬",instruction:"Think carefully about the direction of potassium movement and the pumps involved before dragging.",items:[{id:"path-1",text:"Na⁺/K⁺-ATPase keeps K⁺ primarily in the intracellular fluid",answer:"both",hint:"This pump is central to both conditions — it's the reason imbalances matter."},{id:"path-2",text:"Alkalemia, insulin, and β-adrenergic stimulation shift K⁺ into cells, lowering serum K⁺",answer:"hypo",hint:"Which condition results from K⁺ moving inward?"},{id:"path-3",text:"Insulin deficiency (e.g., DKA) leaves K⁺ stranded in the bloodstream",answer:"hyper",hint:"Without insulin activating the pump, K⁺ cannot enter cells."},{id:"path-4",text:"Acidosis forces H⁺ into cells, pushing K⁺ out to maintain electrical balance",answer:"hyper",hint:"Cations swap — H⁺ moves in, K⁺ moves out."},{id:"path-5",text:"High extracellular K⁺ causes the resting membrane potential to become less negative (partial depolarization)",answer:"hyper",hint:"When K⁺ outside the cell is high, the gradient driving K⁺ outflow is reduced."},{id:"path-6",text:"Partial depolarization inactivates Na⁺ channels → reduced excitability and shorter action potentials",answer:"hyper",hint:"This leads to muscle weakness and cardiac instability in one condition."},{id:"path-7",text:"Magnesium deficiency prevents inhibition of ROMK channels → unchecked K⁺ secretion",answer:"hypo",hint:"Hypomagnesemia is notorious for making one electrolyte imbalance refractory to treatment."},{id:"path-8",text:"Osmotic drag: high blood glucose pulls water and K⁺ out of cells",answer:"hyper",hint:"Hyperglycemia shifts K⁺ in which direction — into or out of cells?"},{id:"path-9",text:"Aldosterone stimulates K⁺ secretion in the cortical collecting duct",answer:"hypo",hint:"Excess aldosterone wastes potassium — which condition does that worsen?"},{id:"path-10",text:"Negatively charged urine solutes (e.g., Penicillin G, bicarbonate) drag K⁺ into urine",answer:"hypo",hint:"Anions in the tubular lumen attract cations — which electrolyte follows?"},{id:"path-11",text:"Chronic malnutrition / heavy alcohol use can directly deplete total body K⁺",answer:"hypo",hint:"Inadequate intake eventually overwhelms renal conservation."},{id:"path-12",text:"Lower GI losses (diarrhea/laxatives): stool contains 30–90 mEq/L of K⁺",answer:"hypo",hint:"Consider in which direction losing stool K⁺ shifts serum levels."},{id:"path-13",text:"Upper GI losses (vomiting): indirect renal K⁺ wasting via aldosterone and bicarbonaturia",answer:"hypo",hint:"Gastric fluid itself is low in K⁺, but volume loss triggers renal wasting."}]},{id:"etiology",title:"Etiology & Causes",subtitle:"Classify each cause or syndrome under the right condition",icon:"🧬",instruction:"Some causes are specific to one condition; think about whether the mechanism raises or lowers potassium.",items:[{id:"etio-1",text:"Gitelman syndrome (thiazide-like defect in distal tubule)",answer:"hypo",hint:"Thiazide-like genetic defects impair K⁺ reabsorption."},{id:"etio-2",text:"Bartter syndrome (loop-like defect in thick ascending limb)",answer:"hypo",hint:"Loop-like genetic tubular defects cause urinary K⁺ wasting."},{id:"etio-3",text:"Liddle syndrome (ENaC overactivity → excess Na⁺ reabsorption and K⁺ loss)",answer:"hypo",hint:"ENaC overactivity increases the lumen-negative charge, dragging K⁺ out."},{id:"etio-4",text:"Primary Hyperaldosteronism (excess aldosterone → Na⁺ retention, K⁺ loss, hypertension)",answer:"hypo",hint:"Conn syndrome presents with hypertension plus low K⁺."},{id:"etio-5",text:"Addison's disease (low cortisol and aldosterone → K⁺ retention)",answer:"hyper",hint:"Without aldosterone, the collecting duct stops secreting K⁺."},{id:"etio-6",text:"Type IV Renal Tubular Acidosis (low aldosterone activity + metabolic acidosis)",answer:"hyper",hint:"This RTA subtype is associated with high K⁺, not low."},{id:"etio-7",text:"Types 1 & 2 Renal Tubular Acidosis (non-anion-gap metabolic acidosis + K⁺ loss)",answer:"hypo",hint:"Distal RTA (Type 1) and proximal RTA (Type 2) both waste K⁺."},{id:"etio-8",text:"Loop diuretics (furosemide) and thiazide diuretics → renal K⁺ wasting",answer:"hypo",hint:"Diuretics that block Na⁺ reabsorption upstream increase flow to the collecting duct, promoting K⁺ secretion."},{id:"etio-9",text:"Rhabdomyolysis: crushed muscle releases massive intracellular K⁺ into blood",answer:"hyper",hint:"Cell death dumps contents — including K⁺ — into the extracellular space."},{id:"etio-10",text:"Tumor Lysis Syndrome: chemotherapy triggers rapid cancer-cell breakdown",answer:"hyper",hint:"Rapid cell lysis releases intracellular electrolytes, including K⁺."},{id:"etio-11",text:"Pseudohyperkalemia: red blood cells rupture during blood draw (hemolysis artifact)",answer:"hyper",hint:"Tight tourniquets and small needles can cause in-vitro hemolysis, falsely elevating lab K⁺."},{id:"etio-12",text:"AKI from sepsis, contrast dye, or nephrotoxic drugs → inability to secrete K⁺",answer:"hyper",hint:"Acute loss of kidney function impairs K⁺ excretion."},{id:"etio-13",text:"CKD: hyperkalemia appears when GFR falls to under 10–15% of normal",answer:"hyper",hint:"Residual nephrons can compensate until the GFR is severely reduced."},{id:"etio-14",text:"Inhaled β₂-agonists (e.g., asthma inhalers) shift K⁺ into cells",answer:"hypo",hint:"β-adrenergic stimulation activates Na⁺/K⁺-ATPase, moving K⁺ intracellularly."}]},{id:"clinical",title:"Clinical Presentation",subtitle:"Match symptoms and clinical clues to the correct condition",icon:"🩺",instruction:"Pay attention to subtle differences — some symptoms sound similar but stem from opposite extremes of K⁺.",items:[{id:"clin-1",text:"Muscle cramping, weakness, and diffuse muscular pain",answer:"both",hint:"Both high and low K⁺ disrupt normal muscle membrane excitability."},{id:"clin-2",text:"Constipation due to decreased smooth muscle motility",answer:"hypo",hint:"Low K⁺ reduces GI smooth muscle tone — think sluggish bowels."},{id:"clin-3",text:"Rhabdomyolysis (overt muscle cell breakdown at very low levels)",answer:"hypo",hint:"Severe potassium depletion can destroy muscle cells directly."},{id:"clin-4",text:"Dark urine (myoglobinuria) as a presenting symptom",answer:"hyper",hint:"Dark urine suggests myoglobin from muscle breakdown — a cause, not a consequence."},{id:"clin-5",text:"Palpitations / fluttering sensation in the chest",answer:"both",hint:"Both extremes of K⁺ disturb cardiac conduction."},{id:"clin-6",text:"Lightheadedness and thirst with volume depletion (vomiting, diarrhea, diuretics)",answer:"hypo",hint:"Volume-depleting causes are most closely associated with one imbalance."},{id:"clin-7",text:"Hypertension as a clue pointing to Primary Hyperaldosteronism",answer:"hypo",hint:"Conn syndrome = high aldosterone, high BP, and low K⁺."},{id:"clin-8",text:"Edema from kidney failure as an underlying-cause symptom",answer:"hyper",hint:"CKD and heart failure cause fluid retention and impaired K⁺ excretion."},{id:"clin-9",text:"Polyuria and vomiting in the context of DKA",answer:"hyper",hint:"DKA causes high serum K⁺ despite total-body depletion."},{id:"clin-10",text:"Potential for cardiac arrest / fatal arrhythmia at very low K⁺ levels (< 2.5 mEq/L)",answer:"hypo",hint:"Extreme depletion is directly pro-arrhythmic."},{id:"clin-11",text:"Paralysis as a neuromuscular extreme in severe cases",answer:"hyper",hint:"Partial depolarization of membranes eventually renders them unexcitable."}]},{id:"diagnosis",title:"ECG Findings & Diagnosis",subtitle:"Assign each finding or test to the correct condition",icon:"📈",instruction:"ECG changes are particularly high-yield. Consider how too much vs. too little K⁺ affects the cardiac action potential.",items:[{id:"diag-1",text:"Peaked (tall, thin, symmetrical 'tent-shaped') T waves",answer:"hyper",hint:"High extracellular K⁺ shortens repolarization, producing tall, narrow T waves."},{id:"diag-2",text:"Flattened or shallow T waves",answer:"hypo",hint:"Low K⁺ delays repolarization, broadening and flattening the T wave."},{id:"diag-3",text:"Prominent U waves (deflection after the T wave)",answer:"hypo",hint:"U waves — especially prominent ones — are a hallmark ECG finding."},{id:"diag-4",text:"Prolonged PR interval and loss of P waves",answer:"hyper",hint:"Advanced K⁺ elevation slows AV conduction first, then abolishes atrial activity."},{id:"diag-5",text:"Widened QRS complex (> 0.12 s) progressing to 'sine wave' pattern",answer:"hyper",hint:"Severe hyperkalemia merges the QRS and T wave into a sinusoidal pattern."},{id:"diag-6",text:"Supraventricular tachycardia (SVT) or Ventricular tachycardia (VT) in severe cases",answer:"hypo",hint:"Low K⁺ prolongs the QT and sets the stage for re-entrant tachyarrhythmias."},{id:"diag-7",text:"Short QT interval (often < 0.4 s) as an early ECG change",answer:"hyper",hint:"High K⁺ speeds up repolarization early on, shortening the QT."},{id:"diag-8",text:"24-hour urine K⁺ > 25–30 mEq/day → renal wasting; spot K⁺ > 30 mEq/L or K:Cr ratio > 13 mEq/g",answer:"hypo",hint:"These tests distinguish renal from non-renal potassium loss."},{id:"diag-9",text:"Serum bicarbonate checked to identify Renal Tubular Acidosis (Types 1 & 2)",answer:"hypo",hint:"Non-anion-gap acidosis + low K⁺ → think RTA Types 1 or 2."},{id:"diag-10",text:"Creatine kinase (CK) elevated → confirms rhabdomyolysis",answer:"hyper",hint:"CK is the muscle-breakdown marker most directly linked to one cause of high K⁺."},{id:"diag-11",text:"Uric acid and phosphate elevated → consistent with Tumor Lysis Syndrome",answer:"hyper",hint:"TLS releases phosphate, uric acid, and K⁺ from lysed cells."},{id:"diag-12",text:"Urinalysis: heme-positive but no RBCs on microscopy → myoglobinuria",answer:"hyper",hint:"This dipstick/microscopy pattern is classic for rhabdomyolysis."},{id:"diag-13",text:"Co-existing calcium, phosphate, and magnesium levels checked alongside serum K⁺",answer:"hypo",hint:"Electrolyte disorders rarely travel alone; repletion of one may require correcting others."}]},{id:"management",title:"Management & Treatment",subtitle:"Match each treatment or guideline to the correct condition",icon:"💊",instruction:"Treatment strategies are often opposite — repletion vs. removal. Use that logic to sort carefully.",items:[{id:"mgmt-1",text:"Calcium gluconate / chloride IV: stabilizes cardiac membrane without lowering K⁺ (used only with ECG changes)",answer:"hyper",hint:"This is membrane stabilization — the 'C' in C BIG K."},{id:"mgmt-2",text:"Insulin + glucose IV: drives K⁺ into cells via Na⁺/K⁺-ATPase",answer:"hyper",hint:"Shifting K⁺ into cells is a temporizing measure for one condition."},{id:"mgmt-3",text:"Inhaled albuterol: β-agonist shifts K⁺ into cells (adjunct)",answer:"hyper",hint:"The same mechanism that causes low K⁺ (β-stimulation) is exploited to treat high K⁺."},{id:"mgmt-4",text:"IV sodium bicarbonate: used if metabolic acidosis is the driver; less effective at normal pH",answer:"hyper",hint:"Correcting acidosis reverses the H⁺/K⁺ shift."},{id:"mgmt-5",text:"Loop diuretics (furosemide): increase urinary K⁺ excretion (requires working kidneys)",answer:"hyper",hint:"Furosemide removes K⁺ in one condition and paradoxically causes it in the other."},{id:"mgmt-6",text:"Sodium Polystyrene Sulfonate (Kayexalate): GI K⁺ binder; acts in 2–24 hours",answer:"hyper",hint:"These cation-exchange resins remove K⁺ through the gut."},{id:"mgmt-7",text:"Patiromer / Zirconium Cyclosilicate: modern potassium binders for chronic management",answer:"hyper",hint:"Newer binders with better tolerability than Kayexalate."},{id:"mgmt-8",text:"Dialysis: definitive treatment for life-threatening cases unresponsive to medications",answer:"hyper",hint:"When kidneys completely fail and meds aren't enough, only one intervention removes K⁺ reliably."},{id:"mgmt-9",text:"Oral / enteral KCl (preferred route): 40 mEq can be given at once; 10 mEq raises K⁺ by ~0.1 mEq/L",answer:"hypo",hint:"This is adding K⁺ back — which condition requires repletion?"},{id:"mgmt-10",text:"IV K⁺ repletion: never exceed 10 mEq/h via peripheral line; reserved for severe cases / ECG changes / NPO",answer:"hypo",hint:"IV potassium carries cardiac risk — this safety rule applies to repletion."},{id:"mgmt-11",text:"Potassium Bicarbonate supplement: preferred when concurrent metabolic acidosis (RTA) is present",answer:"hypo",hint:"Choose the potassium salt that also helps correct acid-base status."},{id:"mgmt-12",text:"Potassium Phosphate supplement: used when hypophosphatemia co-exists",answer:"hypo",hint:"Combine repletion when two electrolytes are low simultaneously."},{id:"mgmt-13",text:"Magnesium must be repleted first to resolve refractory hypokalemia",answer:"hypo",hint:"Without fixing Mg²⁺, ROMK channels stay open and K⁺ keeps leaking."},{id:"mgmt-14",text:"Add potassium-sparing diuretics (Spironolactone, Amiloride, Triamterene) or reduce diuretic dose",answer:"hypo",hint:"These agents block the mechanism responsible for diuretic-induced K⁺ loss."},{id:"mgmt-15",text:"Spironolactone to block aldosterone receptors in Primary Hyperaldosteronism",answer:"hypo",hint:"Blocking aldosterone prevents ongoing renal K⁺ wasting."},{id:"mgmt-16",text:"ACE inhibitors / ARBs: retain K⁺ by reducing aldosterone production",answer:"hypo",hint:"These agents reduce the drive for renal K⁺ secretion."},{id:"mgmt-17",text:"Stop ACE inhibitors, ARBs, or NSAIDs that impair K⁺ excretion",answer:"hyper",hint:"Removing offending agents treats the underlying cause of elevated K⁺."},{id:"mgmt-18",text:"IV fluids to increase urine flow and 'wash out' excess K⁺",answer:"hyper",hint:"Volume expansion promotes urinary K⁺ excretion."}]}];function f0({sections:E,currentIndex:Y,completedSections:O,onSelect:h}){const D=[...O.values()].reduce((G,A)=>G+A.score,0),K=[...O.values()].reduce((G,A)=>G+A.total,0),X=E.reduce((G,A)=>G+A.items.length,0);return f.jsxs("aside",{className:"flex flex-col bg-slate-900 text-white w-56 shrink-0 h-screen overflow-y-auto",children:[f.jsxs("div",{className:"px-4 pt-5 pb-4 border-b border-slate-700",children:[f.jsxs("div",{className:"flex items-center gap-2 mb-1",children:[f.jsx("span",{className:"text-2xl",children:"⚡"}),f.jsx("h1",{className:"font-extrabold text-base leading-tight text-white",children:"K⁺ Imbalance"})]}),f.jsx("p",{className:"text-xs text-slate-400 leading-tight",children:"Hypokalemia vs. Hyperkalemia"}),f.jsx("p",{className:"text-xs text-slate-500 mt-1",children:"Drag-and-Drop Mastery"})]}),K>0&&f.jsxs("div",{className:"px-4 py-3 border-b border-slate-700",children:[f.jsxs("div",{className:"flex items-center justify-between mb-1.5",children:[f.jsx("span",{className:"text-xs text-slate-400 font-medium",children:"Overall Score"}),f.jsxs("span",{
